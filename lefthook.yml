commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - name: lint-staged
      run: pnpm lint-staged
    - name: versioned-write-guard
      run: node scripts/guard-versions.mjs --staged

pre-push:
  jobs:
    - name: lint
      run: pnpm lint
    - name: test
      run: pnpm test
    - name: version:check
      run: pnpm version:check
