<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <!-- NOTE: initial-scale must stay in sync with MOBILE_INITIAL_SCALE in @hoardodile/ui/viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
  <title>Hoardodile</title>
  <script>
    // Resolve theme before React mounts so the first paint matches the
    // user's stored preference. Without this, body would briefly render
    // light-token background before ThemeProvider's useEffect flips it.
    // Storage keys/palette names MUST match `lib/keys.ts`
    // (`prefKeys.theme`, `prefKeys.themePalette`) and `ThemeProvider.THEME_PALETTES`.
    (() => {
      var t, p, resolved;
      try {
        t = localStorage.getItem("theme");
        p = localStorage.getItem("themePalette");
        resolved = t === "dark" || t === "light"
          ? t
          : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.classList.add(resolved);
        if (p && p !== "default") {
          document.documentElement.classList.add(`theme-${p}`);
        }
      } catch (_) {
        document.documentElement.classList.add("light");
      }
    })();
  </script>
  <style>
    body {
      overflow-y: scroll;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
