name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - apps/docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      # Filtered install: only docs deps, skipping heavy native builds
      # (sharp, ffmpeg) needed by the app packages.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @hoardodile/docs
      - name: Build
        run: pnpm -F @hoardodile/docs build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/out

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
