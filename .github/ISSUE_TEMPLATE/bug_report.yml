name: Bug Report
description: Report a defect in hoardodile
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: hoardodile version or commit
      description: The release tag (e.g. v0.1.0) or commit hash you are running.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v24.0.0
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What you did, step by step, so the problem can be reproduced.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
      description: What actually happened. Include relevant logs — redact anything private first.
    validations:
      required: true
